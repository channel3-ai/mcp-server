# Destination in repo: .github/workflows/publish-mcp.yml
#
# Publishes server.json to the Official MCP Registry on each version tag.
# Auth is GitHub OIDC, so NO secrets or tokens are needed: because this runs
# inside a channel3-ai repo, the registry grants it the io.github.channel3-ai/*
# namespace automatically.
#
# Verified against the official guide (Jun 2026):
# https://github.com/modelcontextprotocol/registry/blob/main/docs/modelcontextprotocol-io/github-actions.mdx
# Channel3 is a remote server (no npm/PyPI package), so the package-publish steps
# in that guide are intentionally omitted here.

name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]        # triggers on version tags like v1.0.0
  workflow_dispatch: {}  # also allows a manual run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for GitHub OIDC auth to the registry
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # Optional: sync server.json version to the pushed tag (strips the leading "v")
      # - name: Set version from tag
      #   run: |
      #     VERSION=${GITHUB_REF#refs/tags/v}
      #     jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
